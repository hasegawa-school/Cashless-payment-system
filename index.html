<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャッシュレス レジ (GitHub版)</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        text-align: center;
        margin-top: 40px;
        background-color: #f8f9fa;
      }
      .input-large {
        font-size: 32px;
        padding: 10px;
        width: 220px;
        text-align: center;
      }
      .button {
        font-size: 26px;
        padding: 12px 28px;
        margin-top: 14px;
        background-color: #007bff;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
      }
      .button.cancel {
        background-color: #dc3545;
      }
      .button.disabled {
        background-color: #888;
        cursor: not-allowed;
      }
      #pw-box {
        position: fixed;
        left: 20px;
        bottom: 20px;
        background: rgba(255,255,255,0.9);
        padding: 5px;
        border-radius: 5px;
        box-shadow: 0 0 5px rgba(0,0,0,0.2);
        z-index: 1000;
      }
      #pw-box input {
        font-size: 16px;
        padding: 5px;
        width: 100px;
      }
      #camera-area {
        display: none;
        max-width: 500px;
        margin: 20px auto;
        position: relative;
      }
      #result {
        font-size: 36px;
        margin-top: 25px;
        font-weight: bold;
      }
      #salesToday {
        margin-top:30px; 
        font-size:24px; 
        color:#444;
      }
      #soundCheckBtn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #2196f3;
        color: white;
        padding: 10px 18px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 16px;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        z-index: 9999;
        cursor: pointer;
        border: none;
      }
      #soundCheckBtn:hover {
        background: #1976d2;
      }
      #copyright {
        position: fixed;
        bottom: 8px;
        width: 100%;
        text-align: center;
        font-size: 12px;
        color: #888;
        pointer-events: none;
      }
      /* ファイル選択ボタンをレジに合う大きいボタンにするスタイル */
      .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
      }
      .file-input-wrapper input[type=file] {
        font-size: 100px;
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h1>キャッシュレス レジ</h1>

    <div id="pw-box">
      <input id="password" type="text" placeholder="レジPW">
    </div>

    <div id="salesToday">今日の売上：0 円</div>

    <div id="input-area">
      <h2>会計金額</h2>
      <input id="payment" type="number" class="input-large" placeholder="0" onkeydown="if(event.key==='Enter') startQRFlow()">
      <br>
      
      <div class="file-input-wrapper">
        <button class="button">QRカメラ起動</button>
        <input type="file" accept="image/*" capture="environment" id="qr-file-input" onchange="handleFile(this.files)">
      </div>
    </div>

    <div id="camera-area">
      <h2 style="color: #e67e22;">会計金額: <span id="displayAmount">0</span> 円</h2>
      <div id="loading-text" style="font-size: 24px; font-weight: bold; margin: 20px;">画像解析中...</div>
      <button class="button cancel" onclick="resetScreen()">キャンセル</button>
    </div>

    <div id="result" style="display:none;"></div>

    <button id="soundCheckBtn" onclick="testSound()">音チェック</button>

    <script>
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxPKbGDE_9q9UeIjVQ1dB9yKbZcWZzZWt9SVZcS3nJmgw6wCMCKTFhZFnF07qh8FP72/exec";

      let todaySales = 0;
      let audioClick = new Audio("https://pocket-se.info/se/barcode.mp3");
      let audioSuccess = new Audio("https://pocket-se.info/se/itemget5.mp3");

      function testSound() {
        window.open("https://pocket-se.info/se/barcode.mp3", "_blank");
      }

      function updateSalesDisplay() {
        document.getElementById("salesToday").innerText = "今日の売上：" + todaySales + " 円";
      }

      function resetScreen() {
        document.getElementById("result").style.display = "none";
        document.getElementById("camera-area").style.display = "none";
        document.getElementById("input-area").style.display = "block";
        document.getElementById("salesToday").style.display = "block";
        document.getElementById("payment").value = "";
        document.getElementById("password").focus();
      }

      function startQRFlow() {
        const pw = document.getElementById("password").value;
        const pay = Number(document.getElementById("payment").value);

        if (!pw) { alert("左下のパスワードを入力してください。"); return false; }
        if (document.getElementById("payment").value === "" || pay < 0) { alert("正しい会計金額を入力してください。"); return false; }

        audioClick.load();
        audioSuccess.load();
        return true;
      }

      // ★写真を撮るか、画像が選ばれたら動く処理
      function handleFile(files) {
        if (files.length === 0) return;
        
        // パスワードと金額の事前チェック
        if (!startQRFlow()) {
          document.getElementById("qr-file-input").value = "";
          return;
        }

        const file = files[0];
        
        // 画面を通信中（解析中）っぽく切り替える
        const pay = Number(document.getElementById("payment").value);
        document.getElementById("input-area").style.display = "none";
        document.getElementById("salesToday").style.display = "none";
        document.getElementById("displayAmount").innerText = pay;
        document.getElementById("camera-area").style.display = "block";

        // パスワードチェックをGASにリクエスト
        const pw = document.getElementById("password").value;
        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "checkPassword", pw: pw })
        })
        .then(res => res.json())
        .then(data => {
          if (data.ok) {
            // パスワードOKなら、撮った写真（画像）の「ファイル名」をそのままカードID（101など）として使うか、
            // もしくは今回は「101」固定として即時決済に回します。
            // ※学校の制限で画像解析ができないため、写真を撮る＝スキャン成功 とみなして進めます。
            
            audioClick.play().catch(e => console.log("音エラー:", e));
            
            // 撮影された画像に関わらず、テスト中の「101」として決済を行います
            processPayment("101");
          } else {
            alert("パスワードがちがいます。");
            resetScreen();
          }
        })
        .catch(err => {
          alert("通信エラーが発生しました。");
          resetScreen();
        });

        // 次回のためにボタンをリセット
        document.getElementById("qr-file-input").value = "";
      }

      function processPayment(cardId) {
        const pw = document.getElementById("password").value;
        const pay = Number(document.getElementById("payment").value);

        document.getElementById("camera-area").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("result").innerText = "通信中...";

        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "pay", pw: pw, card: cardId, pay: pay })
        })
        .then(res => res.json())
        .then(data => {
          if (!data.success) {
            alert(data.message);
            resetScreen();
            return;
          }

          document.getElementById("result").innerText = "残高：" + data.newBalance + " 円";
          todaySales += pay;
          updateSalesDisplay();

          audioSuccess.play().catch(e => console.log("音声再生エラー:", e));

          setTimeout(resetScreen, 2500);
        })
        .catch(err => {
          alert("決済通信エラーが発生しました。");
          resetScreen();
        });
      }

      window.onload = () => {
        document.getElementById("payment").focus();
      };
    </script>
    <div id="copyright">© 2026 Hasegawa Konosuke. All rights reserved.</div>
  </body>
</html>
