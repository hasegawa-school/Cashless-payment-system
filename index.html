<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>キャッシュレスレジ（テストモード）</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 20px; }
        input[type="number"], input[type="password"] { width: 80%; padding: 12px; font-size: 20px; margin-bottom: 20px; border: 2px solid #ccc; border-radius: 6px; text-align: center; }
        input:focus { border-color: #007bff; outline: none; background-color: #f7faff; }
        .test-box { background-color: #e9ecef; border: 2px dashed #6c757d; padding: 25px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; color: #333; }
        #result { margin-top: 20px; font-size: 18px; font-weight: bold; padding: 15px; border-radius: 6px; min-height: 50px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .footer-pass { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; text-align: left; font-size: 12px; z-index: 1000; }
        .footer-pass input { width: 100px; margin: 5px 0 0 0; padding: 5px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>キャッシュレスレジ 🛒<br><span style="font-size: 16px; color: red;">【てすとモード】</span></h1>
    
    <label for="amount" style="font-weight: bold;">💸 ひくお金（きんがく）を入力してね</label><br>
    <input type="number" id="amount" placeholder="金額を入力（例：500）" min="1" autofocus><br>
    
    <div class="test-box">
        💡 金額を入れたら、そのままキーボードの<br>
        <span style="font-size: 24px; color: #007bff;">「Enter（エンター）」</span> を押してね！<br>
        <span style="font-size: 14px; color: #555; font-weight: normal;">（自動で1001番のカードを読み込んだことになります）</span>
    </div>

    <div id="result">きんがくを入れてEnterを押してね。</div>
</div>

<div class="footer-pass">
    <label for="password">🔑 レジパスワード</label><br>
    <input type="password" id="password" placeholder="パスワード">
</div>

<script>
    const amountInput = document.getElementById("amount");
    const passwordInput = document.getElementById("password");
    const resultDiv = document.getElementById("result");

    // 自前で電子音を合成して鳴らす関数
    function playSound(type) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (type === 'pi') {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'pirorin') {
            const notes = [880, 1100, 1320, 1760];
            notes.forEach((freq, index) => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.06));
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime + (index * 0.06));
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (index * 0.06) + 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (index * 0.06));
                osc.stop(audioCtx.currentTime + (index * 0.06) + 0.3);
            });
        }
    }

    // 金額入力欄で「Enterキー」が押されたら動く設定
    amountInput.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            event.preventDefault(); // 画面のリロードを防止
            
            const amount = amountInput.value;
            const password = passwordInput.value;
            const mockQrCode = "1001"; // 👈 ここで「1001」を読み込んだことに固定！

            // バリデーションチェック
            if (!password) { alert("左下のレジパスワードを入力してください！"); return; }
            if (!amount || amount <= 0) { alert("正しいきんがくを入力してください！"); return; }

            // Enterを押した瞬間に「ピッ」
            playSound('pi');
            
            // Google内部の関数を呼び出してスプレッドシートを更新
            resultDiv.className = "";
            resultDiv.innerText = "つうしん中... スプレッドシートを書きかえています...";

            google.script.run
                .withSuccessHandler(function(data) {
                    if (data.success) {
                        // 成功したら「ピロリーン」
                        playSound('pirorin'); 
                        resultDiv.className = "success";
                        resultDiv.innerHTML = `🟢 けっさいせいこう！<br>
                                               ばんごう: ${data.qr} (テスト固定)<br>
                                               ひいたおかね: ${amount}えん<br>
                                               のこりのおかね: <b>${data.newBalance}えん</b>`;
                        amountInput.value = ""; // 金額をクリア
                        amountInput.focus();   // 次のためにカーソルを戻す
                    } else {
                        resultDiv.className = "error";
                        resultDiv.innerText = "❌ えらー: " + data.message;
                    }
                })
                .withFailureHandler(function(err) {
                    resultDiv.className = "error";
                    resultDiv.innerText = "❌ つうしんえらー: GAS側のプログラムに問題があるかもしれません。";
                })
                .processPayment(password, amount, mockQrCode);
        }
    });
</script>

</body>
</html>
