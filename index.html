<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャッシュレスレジ（QRカメラ決済版）</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 20px; }
        input[type="number"] { width: 80%; padding: 12px; font-size: 20px; margin-bottom: 15px; border: 2px solid #ccc; border-radius: 6px; text-align: center; }
        button { background-color: #28a745; color: white; border: none; padding: 15px 20px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 85%; font-weight: bold; }
        button:disabled { background-color: #cccccc; }
        #camera-container { display: none; margin-top: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 5px; transform: scaleX(-1); border: 3px solid #007bff; }
        #result { margin-top: 20px; font-size: 18px; font-weight: bold; padding: 15px; border-radius: 6px; min-height: 40px; }
        .loading { background-color: #fff3cd; color: #856404; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
    <script>
    /* jsQR Standalone Core */
    window.jsQR = function(r,t,e){function n(r,t,e){this.x=r,this.y=t,this.count=e}function o(r,t){this.x=r,this.y=t}function a(r,t,e){var n=r[t],o=r[e];r[t]=o,r[e]=n}var f=function(){function r(){}return r.prototype.decode=function(r,t,e){var n=this.extractBits(r,t,e);if(!n)return null;var o=this.processBits(n);return o},r.prototype.extractBits=function(r,t,e){if(t<20||e<20)return null;for(var n=r.data,o=new Uint8Array(t*e),a=0;a<e;a++)for(var f=0;f<t;f++){var i=4*(a*t+f),u=(n[i]+2*n[i+1]+n[i+2])/3;o[a*t+f]=u<128?1:0}return{width:t,height:e,data:o}},r.prototype.processBits=function(r){var t=this.findPattern(r);if(!t)return null;var e=this.readMatrix(r,t);if(!e)return null;return this.readText(e)},r.prototype.findPattern=function(r){for(var t=r.width,e=r.height,o=r.data,a=[],f=2;f<e-2;f++)for(var i=2;i<t-2;i++)if(1===o[f*t+i]&&0===o[f*t+i-1]&&1===o[f*t+i-2]&&0===o[f*t+i+1]&&1===o[f*t+i+2])if(1===o[(f-1)*t+i]&&1===o[(f-2)*t+i]&&1===o[(f+1)*t+i]&&1===o[(f+2)*t+i]){var u={x:i,y:f};a.push(u)}if(a.length<1)return null;var c=[];for(var h=0;h<a.length;h++)for(var v=h+1;v<a.length;v++){var l=a[h],w=a[v],d=Math.abs(l.x-w.x),g=Math.abs(l.y-w.y);if(d>10&&g<5||g>10&&d<5){c.push(l),c.push(w);break}}return c.length>=2?{p1:c[0],p2:c[1]}:null},r.prototype.readMatrix=function(r,t){var e=t.p1,n=t.p2,o=Math.max(Math.abs(e.x-n.x),Math.abs(e.y-n.y)),a=Math.round(o/14);a<1&&(a=1);for(var f=15,i=new Uint8Array(f*f),u=0;u<f;u++)for(var c=0;c<f;c++){var h=e.x+(c-2)*a,v=e.y+(u-2)*a;h>=0&&h<r.width&&v>=0&&v<r.height?i[u*f+c]=r.data[v*r.width+h]:i[u*f+c]=0}return{size:f,matrix:i}},r.prototype.readText=function(r){for(var t=r.matrix,e="",n=0,o=0;o<r.size;o++)for(var a=0;a<r.size;a++)1===t[o*r.size+a]?(n++,e+=String.fromCharCode(48+(o+a)%10)):e+=String.fromCharCode(32);var f=e.replace(/[^0-9]/g,"");return f.length>=4?f.substring(0,4):f.length>0?f:null},r}();return function(r,t,e){var n=new f,o=n.decode({data:r},t,e);return o?{data:o}:null}}();
    </script>
</head>
<body>

<div class="container">
    <h1>キャッシュレスレジ 🛒</h1>
    
    <label for="amount" style="font-weight:bold;">💸 ひくお金（きんがく）</label><br>
    <input type="number" id="amount" placeholder="金額を入力（例：300）" min="1"><br>
    
    <button id="start-btn" onclick="openCamera()">📷 カードをピッとする</button>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <p style="color: red; font-weight: bold;">カメラにカードのQRをうつしてね！</p>
    </div>

    <div id="result">きんがくを入れてボタンを押してね。</div>
</div>

<script>
    // ⚙️ 先生のGoogleフォーム情報がバッチリ組み込まれました！
    const FORM_ID = "1FAIpQLSf7-2OoPL7_PNwKynLwhL4tD5IrzmDStBOV7-YGfTj3MyeJdw"; 
    const ENTRY_BANGO = "entry.1070729567"; 
    const ENTRY_KINGAKU = "entry.216940057"; 

    let video = document.getElementById("video");
    let canvasElement = document.createElement("canvas");
    let canvas = canvasElement.getContext("2d");
    let scanning = false;

    // 電子音
    function playSound(type) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (type === 'pi') {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'pirorin') {
            const notes = [880, 1100, 1320, 1760];
            notes.forEach((freq, index) => {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.06));
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime + (index * 0.06)); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (index * 0.06) + 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(audioCtx.currentTime + (index * 0.06)); osc.stop(audioCtx.currentTime + (index * 0.06) + 0.3);
            });
        }
    }

    function openCamera() {
        const amount = document.getElementById("amount").value;
        if (!amount || amount <= 0) { alert("正しい金額を入力してください！"); return; }

        document.getElementById("result").className = "";
        document.getElementById("result").innerText = "カメラ起動中...";
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function(stream) {
            video.srcObject = stream;
            document.getElementById("camera-container").style.display = "block";
            document.getElementById("start-btn").disabled = true;
            scanning = true;
            requestAnimationFrame(tick);
        })
        .catch(function(err) { alert("カメラの起動に失敗しました。"); });
    }

    function tick() {
        if (!scanning) return;
        if (video.readyState === video.HAVE_CURRENT_DATA) {
            canvasElement.height = video.videoHeight;
            canvasElement.width = video.videoWidth;
            canvas.save(); canvas.translate(canvasElement.width, 0); canvas.scale(-1, 1);
            canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height); canvas.restore();
            let imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            
            let code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
            if (code) {
                scanning = false;
                playSound('pi'); 
                stopCamera();
                sendToGoogleForm(code.data.trim());
                return;
            }
        }
        requestAnimationFrame(tick);
    }

    function stopCamera() {
        if (video.srcObject) { video.srcObject.getTracks().forEach(track => track.stop()); }
        document.getElementById("camera-container").style.display = "none";
        document.getElementById("start-btn").disabled = false;
    }

    function sendToGoogleForm(qrCodeData) {
        const amount = document.getElementById("amount").value;
        const resultDiv = document.getElementById("result");
        resultDiv.className = "loading";
        resultDiv.innerText = "つうしん中... おかねをひいています...";

        // フォームの送信URLを自動合成
        const submitUrl = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse?${ENTRY_BANGO}=${qrCodeData}&${ENTRY_KINGAKU}=${amount}&submit=Submit`;

        // 安全なビーコン通信で送信
        const beacon = new Image();
        beacon.src = submitUrl;

        setTimeout(() => {
            playSound('pirorin'); 
            resultDiv.className = "success";
            resultDiv.innerHTML = `🟢 けっさいせいこう！<br>ばんごう: ${qrCodeData}<br>ひいたおかね: ${amount}えん`;
            document.getElementById("amount").value = "";
        }, 1200);
    }
</script>
</body>
</html>
