<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャッシュレス レジ (GitHub版)</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        text-align: center;
        margin-top: 40px;
        background-color: #f8f9fa;
      }
      .input-large {
        font-size: 32px;
        padding: 10px;
        width: 220px;
        text-align: center;
      }
      .button {
        font-size: 26px;
        padding: 12px 28px;
        margin-top: 14px;
        background-color: #007bff;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
      }
      .button.cancel {
        background-color: #dc3545;
      }
      .button.disabled {
        background-color: #888;
        cursor: not-allowed;
      }
      #pw-box {
        position: fixed;
        left: 20px;
        bottom: 20px;
        background: rgba(255,255,255,0.9);
        padding: 5px;
        border-radius: 5px;
        box-shadow: 0 0 5px rgba(0,0,0,0.2);
        z-index: 1000;
      }
      #pw-box input {
        font-size: 16px;
        padding: 5px;
        width: 100px;
      }
      #camera-area {
        display: none;
        max-width: 500px;
        margin: 20px auto;
        position: relative;
      }
      #webcam {
        width: 100%;
        max-width: 400px;
        border: 4px solid #333;
        border-radius: 10px;
      }
      #result {
        font-size: 36px;
        margin-top: 25px;
        font-weight: bold;
      }
      #salesToday {
        margin-top:30px; 
        font-size:24px; 
        color:#444;
      }
      
      /* ★ 音チェックボタンのスタイル */
      #soundCheckBtn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #2196f3;
        color: white;
        padding: 10px 18px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 16px;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        z-index: 9999;
        cursor: pointer;
        border: none;
      }
      #soundCheckBtn:hover {
        background: #1976d2;
      }

      #copyright {
        position: fixed;
        bottom: 8px;
        width: 100%;
        text-align: center;
        font-size: 12px;
        color: #888;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <h1>キャッシュレス レジ</h1>

    <div id="pw-box">
      <input id="password" type="text" placeholder="パスワード">
    </div>

    <div id="salesToday">今日の売上：0 円</div>

    <div id="input-area">
      <h2>会計金額</h2>
      <input id="payment" type="number" class="input-large" placeholder="0" onkeydown="if(event.key==='Enter') startQRFlow()">
      <br>
      <button id="qrStartBtn" class="button" onclick="startQRFlow()">QR読み取り</button>
    </div>

    <div id="camera-area">
      <h2 style="color: #e67e22;">会計金額: <span id="displayAmount">0</span> 円</h2>
      <video id="webcam" autoplay playsinline></video>
      <canvas id="hidden-canvas" style="display:none;"></canvas>
      <br>
      <button class="button cancel" onclick="stopQRFlow()">キャンセル</button>
    </div>

    <div id="result" style="display:none;"></div>

    <button id="soundCheckBtn" onclick="testSound()">音チェック</button>

    <script>
      // ★ あなたのGASウェブアプリURLをここに貼り付けてください
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxPKbGDE_9q9UeIjVQ1dB9yKbZcWZzZWt9SVZcS3nJmgw6wCMCKTFhZFnF07qh8FP72/exec";

      let todaySales = 0;
      let videoStream = null;
      let animationFrameId = null;

      // 事前にオーディオオブジェクトを作成
      let audioClick = new Audio("https://pocket-se.info/se/barcode.mp3");
      let audioSuccess = new Audio("https://pocket-se.info/se/itemget5.mp3");

      // ★ 音チェックボタンを押したときの処理（音を鳴らしてブラウザの制限を解く）
      function testSound() {
        audioClick.load();
        audioClick.play()
        .then(() => {
          alert("音が正常に鳴りました！スマホの音声制限も解除されました。");
        })
        .catch(e => {
          alert("音声の再生に失敗しました。画面をもう一度タップしてから試してください。");
          console.log("音エラー:", e);
        });
      }

      function updateSalesDisplay() {
        document.getElementById("salesToday").innerText = "今日の売上：" + todaySales + " 円";
      }

      function resetScreen() {
        document.getElementById("result").style.display = "none";
        document.getElementById("camera-area").style.display = "none";
        document.getElementById("input-area").style.display = "block";
        document.getElementById("salesToday").style.display = "block";
        document.getElementById("payment").value = "";
        document.getElementById("qrStartBtn").classList.remove("disabled");
        document.getElementById("qrStartBtn").disabled = false;
        document.getElementById("payment").focus();
      }

      function startQRFlow() {
        const pw = document.getElementById("password").value;
        const pay = Number(document.getElementById("payment").value);

        if (!pw) {
          alert("左下のパスワードを入力してください。");
          return;
        }
        if (document.getElementById("payment").value === "" || pay < 0) {
          alert("正しい会計金額を入力してください。");
          return;
        }

        // ここでも念のためオーディオの準備
        audioClick.load();
        audioSuccess.load();

        document.getElementById("qrStartBtn").classList.add("disabled");
        document.getElementById("qrStartBtn").disabled = true;

        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "checkPassword", pw: pw })
        })
        .then(res => res.json())
        .then(data => {
          if (data.ok) {
            document.getElementById("input-area").style.display = "none";
            document.getElementById("salesToday").style.display = "none";
            document.getElementById("displayAmount").innerText = pay;
