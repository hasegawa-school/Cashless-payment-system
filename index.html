<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャッシュレス レジ (GitHub版)</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        text-align: center;
        margin-top: 40px;
        background-color: #f8f9fa;
      }
      .input-large {
        font-size: 32px;
        padding: 10px;
        width: 220px;
        text-align: center;
      }
      .button {
        font-size: 26px;
        padding: 12px 28px;
        margin-top: 14px;
        background-color: #007bff;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
      }
      .button.cancel {
        background-color: #dc3545;
      }
      .button.disabled {
        background-color: #888;
        cursor: not-allowed;
      }
      #pw-box {
        position: fixed;
        left: 20px;
        bottom: 20px;
      }
      #pw-box input {
        font-size: 16px;
        padding: 5px;
        width: 100px;
      }
      #camera-area {
        display: none;
        max-width: 500px;
        margin: 20px auto;
        position: relative;
      }
      #webcam {
        width: 100%;
        max-width: 400px;
        border: 4px solid #333;
        border-radius: 10px;
        transform: scaleX(-1); /* 自撮り鏡面モード */
      }
      #result {
        font-size: 36px;
        margin-top: 25px;
        font-weight: bold;
      }
      #salesToday {
        margin-top:30px; 
        font-size:24px; 
        color:#444;
      }
      #copyright {
        position: fixed;
        bottom: 8px;
        width: 100%;
        text-align: center;
        font-size: 12px;
        color: #888;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <h1>キャッシュレス レジ</h1>

    <div id="pw-box">
      <input id="password" type="password" placeholder="レジPW">
    </div>

    <div id="salesToday">今日の売上：0 円</div>

    <div id="input-area">
      <h2>会計金額</h2>
      <input id="payment" type="number" class="input-large" placeholder="0" onkeydown="if(event.key==='Enter') startQRFlow()">
      <br>
      <button id="qrStartBtn" class="button" onclick="startQRFlow()">QR読み取り</button>
    </div>

    <div id="camera-area">
      <h2 style="color: #e67e22;">会計金額: <span id="displayAmount">0</span> 円</h2>
      <video id="webcam" autoplay playsinline></video>
      <canvas id="hidden-canvas" style="display:none;"></canvas>
      <br>
      <button class="button cancel" onclick="stopQRFlow()">キャンセル</button>
    </div>

    <div id="result" style="display:none;"></div>

    <script>
      // ★ あなたのGASウェブアプリURLをここに貼り付けてください
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxPKbGDE_9q9UeIjVQ1dB9yKbZcWZzZWt9SVZcS3nJmgw6wCMCKTFhZFnF07qh8FP72/exec";

      let todaySales = 0;
      let videoStream = null;
      let animationFrameId = null;

      function updateSalesDisplay() {
        document.getElementById("salesToday").innerText = "今日の売上：" + todaySales + " 円";
      }

      // 最初の画面に戻す
      function resetScreen() {
        document.getElementById("result").style.display = "none";
        document.getElementById("camera-area").style.display = "none";
        document.getElementById("input-area").style.display = "block";
        document.getElementById("salesToday").style.display = "block";
        document.getElementById("payment").value = "";
        document.getElementById("qrStartBtn").classList.remove("disabled");
        document.getElementById("qrStartBtn").disabled = false;
        document.getElementById("payment").focus();
      }

      // 「QR読み取り」を押した時（PWチェック）
      function startQRFlow() {
        const pw = document.getElementById("password").value;
        const pay = Number(document.getElementById("payment").value);

        if (!pw) {
          alert("左下のパスワードを入力してください。");
          return;
        }
        if (document.getElementById("payment").value === "" || pay < 0) {
          alert("正しい会計金額を入力してください。");
          return;
        }

        document.getElementById("qrStartBtn").classList.add("disabled");
        document.getElementById("qrStartBtn").disabled = true;

        // GASへパスワード確認をリクエスト (fetch通信)
        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "checkPassword", pw: pw })
        })
        .then(res => res.json())
        .then(data => {
          if (data.ok) {
            // パスワード成功 -> カメラ画面へ
            document.getElementById("input-area").style.display = "none";
            document.getElementById("salesToday").style.display = "none";
            document.getElementById("displayAmount").innerText = pay;
            document.getElementById("camera-area").style.display = "block";
            startCamera();
          } else {
            alert("パスワードがちがいます。");
            document.getElementById("qrStartBtn").classList.remove("disabled");
            document.getElementById("qrStartBtn").disabled = false;
          }
        })
        .catch(err => {
          alert("通信エラーが発生しました。");
          document.getElementById("qrStartBtn").classList.remove("disabled");
          document.getElementById("qrStartBtn").disabled = false;
        });
      }

      // カメラの起動とQRスキャンループ
      function startCamera() {
        const video = document.getElementById("webcam");
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
          videoStream = stream;
          video.srcObject = stream;
          video.setAttribute("playsinline", true);
          video.play();
          animationFrameId = requestAnimationFrame(tick);
        })
        .catch(err => {
          alert("カメラの起動に失敗しました。権限を許可してください。");
          stopQRFlow();
        });
      }

      // 毎フレームのQRコード解析
      function tick() {
        const video = document.getElementById("webcam");
        if (video.readyState === video.HAVE_CURRENT_DATA) {
          const canvas = document.getElementById("hidden-canvas");
          const ctx = canvas.getContext("2d");
          canvas.height = video.videoHeight;
          canvas.width = video.videoWidth;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          
          // QRコードの解析執行
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "dontInvert",
          });

          if (code) {
            // 🎵 音声再生（QRを読み取った瞬間）
            let audioClick = new Audio("https://pocket-se.info/se/barcode.mp3");
            audioClick.play().catch(e => console.log("音エラー:", e));

            // スキャン停止
            stopCamera();
            // 決済処理へ進む
            processPayment(code.data);
            return;
          }
        }
        animationFrameId = requestAnimationFrame(tick);
      }

      // カメラの停止
      function stopCamera() {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        if (videoStream) {
          videoStream.getTracks().forEach(track => track.stop());
        }
      }

      // キャンセルボタンが押された時
      function stopQRFlow() {
        stopCamera();
        resetScreen();
      }

      // 本番決済の通信処理（GASへデータ送信）
      function processPayment(cardId) {
        const pw = document.getElementById("password").value;
        const pay = Number(document.getElementById("payment").value);

        document.getElementById("camera-area").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("result").innerText = "通信中...";

        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action: "pay", pw: pw, card: cardId, pay: pay })
        })
        .then(res => res.json())
        .then(data => {
          if (!data.success) {
            alert(data.message);
            resetScreen();
            return;
          }

          // 決済成功
          document.getElementById("result").innerText = "残高：" + data.newBalance + " 円";
          todaySales += pay;
          updateSalesDisplay();

          // 🎵 完了音
          let audioSuccess = new Audio("https://pocket-se.info/se/itemget5.mp3");
          audioSuccess.play().catch(e => console.log("音声再生エラー:", e));

          setTimeout(resetScreen, 2500);
        })
        .catch(err => {
          alert("決済通信エラーが発生しました。");
          resetScreen();
        });
      }

      window.onload = () => {
        document.getElementById("payment").focus();
      };
    </script>
    <div id="copyright">© 2026 Hasegawa Konosuke. All rights reserved.</div>
  </body>
</html>
