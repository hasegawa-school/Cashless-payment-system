<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャッシュレスレジ</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f0f2f5; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 20px; }
        input[type="number"], input[type="password"] { width: 80%; padding: 10px; font-size: 18px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 85%; }
        button:disabled { background-color: #cccccc; }
        #camera-container { display: none; margin-top: 20px; position: relative; }
        video { width: 100%; max-width: 400px; border-radius: 5px; transform: scaleX(-1); } /* 見た目だけ鏡にする */
        #result { margin-top: 20px; font-size: 18px; font-weight: bold; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .footer-pass { position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; text-align: left; font-size: 12px; z-index: 1000; }
        .footer-pass input { width: 100px; margin: 5px 0 0 0; padding: 3px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>キャッシュレスレジ 🛒</h1>
    
    <label for="amount">💸 ひくお金（きんがく）</label><br>
    <input type="number" id="amount" placeholder="金額を入力してください" min="1"><br>
    
    <button id="start-btn" onclick="openCamera()">QRコードをよみとる</button>

    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <p style="color: red; font-weight: bold;">カメラにQRコードをうつしてね</p>
    </div>

    <div id="result"></div>
</div>

<div class="footer-pass">
    <label for="password">🔑 レジパスワード</label><br>
    <input type="password" id="password" placeholder="パスワード">
</div>

<script>
    // ⚠️【ここにコピペ！】GASで発行されたウェブアプリのURLを貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbweS-2xyOnT2a28YO5jbhLTQXzRnadWAtoIDFHXVdf4yTyyufVKN1h5irlw76AQ2HJ3/exec";

    let video = document.getElementById("video");
    let scanning = false;
    let barcodeDetector = null;

    // ブラウザ標準のQRコード検出機能が使えるか確認
    if ('BarcodeDetector' in window) {
        barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
    } else {
        alert("このブラウザはQRコードの自動読み取りに対応していません。Chromeを更新するか、別の端末を試してください。");
    }

    // 自前で電子音を合成して鳴らす関数
    function playSound(type) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (type === 'pi') {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'pirorin') {
            const notes = [880, 1100, 1320, 1760];
            notes.forEach((freq, index) => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.06));
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime + (index * 0.06));
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (index * 0.06) + 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (index * 0.06));
                osc.stop(audioCtx.currentTime + (index * 0.06) + 0.3);
            });
        }
    }

    // カメラ起動
    function openCamera() {
        const amount = document.getElementById("amount").value;
        const password = document.getElementById("password").value;

        if (!password) { alert("パスワードを入力してください！"); return; }
        if (!amount || amount <= 0) { alert("正しい金額を入力してください！"); return; }
        if (!barcodeDetector) { alert("QRコード機能が使えません。"); return; }

        document.getElementById("result").className = "";
        document.getElementById("result").innerText = "カメラをじゅんび中...";
        
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "environment",
                width: { ideal: 640 },
                height: { ideal: 480 }
            } 
        })
        .then(function(stream) {
            video.srcObject = stream;
            document.getElementById("camera-container").style.display = "block";
            document.getElementById("start-btn").disabled = true;
            scanning = true;
            // 映像が始まったら読み取りループを開始
            video.addEventListener('play', () => {
                detectLoop();
            });
        })
        .catch(function(err) {
            alert("カメラが見つからないか、許可されていません。");
            console.error(err);
        });
    }

    // ブラウザ標準機能を使った超高速・反転対応の読み取りループ
    function detectLoop() {
        if (!scanning) return;

        barcodeDetector.detect(video)
        .then(barcodes => {
            if (barcodes.length > 0 && scanning) {
                // QRコードを発見（ブラウザ標準機能なので、左右反転していても100%認識します）
                scanning = false;
                playSound('pi'); // 「ピッ」
                stopCamera();
                sendPayment(barcodes[0].rawValue);
            } else {
                // 見つからなければ次のフレームを検査（約100msごと）
                setTimeout(detectLoop, 100);
            }
        })
        .catch(err => {
            console.error("検知エラー:", err);
            if (scanning) setTimeout(detectLoop, 100);
        });
    }

    function stopCamera() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(track => track.stop());
        }
        document.getElementById("camera-container").style.display = "none";
        document.getElementById("start-btn").disabled = false;
    }

    function sendPayment(qrCodeData) {
        const amount = document.getElementById("amount").value;
        const password = document.getElementById("password").value;
        const resultDiv = document.getElementById("result");

        resultDiv.className = "";
        resultDiv.innerText = "つうしん中... おかねをひいています...";

        fetch(GAS_URL, {
            method: "POST",
            mode: "cors",
            body: JSON.stringify({
                action: "payment",
                password: password,
                amount: amount,
                qrCode: qrCodeData
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                playSound('pirorin'); // 「ピロリーン」
                resultDiv.className = "success";
                resultDiv.innerHTML = `🟢 けっさいせいこう！<br>
                                       ばんごう: ${data.qr}<br>
                                       ひいたおかね: ${amount}えん<br>
                                       のこりのおかね: <b>${data.newBalance}えん</b>`;
                document.getElementById("amount").value = "";
            } else {
                resultDiv.className = "error";
                resultDiv.innerText = "❌ えらー: " + data.message;
            }
        })
        .catch(err => {
            resultDiv.className = "error";
            resultDiv.innerText = "❌ つうしんえらーが発生しました。";
            console.error(err);
        });
    }
</script>

</body>
</html>
