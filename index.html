<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャッシュレスレジ（チェッカー完全移植版）</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #f8f9fa; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        .container { max-width: 450px; width: 100%; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input[type="number"] { width: 80%; padding: 12px; font-size: 22px; margin-bottom: 15px; border: 2px solid #ccc; border-radius: 6px; text-align: center; }
        button { background-color: #2ecc71; color: white; border: none; padding: 15px 20px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 85%; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #cccccc; }
        #camera-container { width: 320px; height: 240px; border: 5px solid #34495e; border-radius: 12px; overflow: hidden; background: #000; margin: 20px auto; position: relative; display: none; }
        .mirror { transform: scaleX(-1); }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #result { margin-top: 20px; font-size: 18px; font-weight: bold; padding: 15px; border-radius: 6px; min-height: 40px; }
        .loading { background-color: #fff3cd; color: #856404; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <h1>キャッシュレスレジ 🛒</h1>
    
    <label for="amount" style="font-weight:bold; color:#2c3e50; font-size:1.1rem;">💸 ひくお金（きんがく）</label><br>
    <input type="number" id="amount" placeholder="金額を入力（例：300）" min="1"><br>
    
    <button id="start-btn" onclick="openCamera()">📷 カードをピッとする</button>

    <div id="camera-container">
        <video id="video" class="mirror" autoplay playsinline></video>
        <canvas id="canvas" hidden></canvas>
    </div>

    <div id="result">金額を入れてボタンを押してね。</div>
</div>

<script>
    // ⚙️ 先生のGoogleフォーム設定情報
    const FORM_ID = "1FAIpQLSf7-2OoPL7_PNwKynLwhL4tD5IrzmDStBOV7-YGfTj3MyeJdw"; 
    const ENTRY_BANGO = "entry.1070729567"; 
    const ENTRY_KINGAKU = "entry.216940057"; 

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const context = canvas.getContext('2d', { willReadFrequently: true });
    const resultText = document.getElementById('result');
    const startBtn = document.getElementById('start-btn');
    const camContainer = document.getElementById('camera-container');

    let isCameraOn = false;
    let localStream = null;

    // 提出物チェッカーのオーディオシステムを完全移植
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // 決済成功時のファンファーレ音（ピロリーン！）
    function playSuccessSound() {
        const notes = [880, 1100, 1320, 1760];
        notes.forEach((freq, index) => {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.06));
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime + (index * 0.06)); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (index * 0.06) + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(audioCtx.currentTime + (index * 0.06)); osc.stop(audioCtx.currentTime + (index * 0.06) + 0.3);
        });
    }

    async function openCamera() {
        const amount = document.getElementById("amount").value;
        if (!amount || amount <= 0) { alert("正しい金額を入力してください！"); return; }

        resultText.className = "";
        resultText.innerText = "カメラ起動中...";
        
        // 提出物チェッカーと全く同じカメラ起動処理
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = localStream;
            camContainer.style.display = "block";
            startBtn.disabled = true;
            isCameraOn = true;
            resultText.style.color = "#e74c3c";
            resultText.innerText = "カメラにカードのQRをうつしてね！";
            requestAnimationFrame(tick);
        } catch (err) {
            resultText.innerText = "カメラエラー";
            alert("カメラの起動に失敗しました。");
        }
    }

    function stopCamera() {
        if (localStream) localStream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
        camContainer.style.display = "none";
        startBtn.disabled = false;
        isCameraOn = false;
    }

    function tick() {
        if (!isCameraOn) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            // 提出物チェッカーで大成功している高画質キャプチャ処理
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            
            if (code) {
                isCameraOn = false; // ループ停止
                playBeep();        // 提出物チェッカーと同じ「ピッ」
                stopCamera();
                sendToGoogleForm(code.data.trim());
                return;
            }
        }
        requestAnimationFrame(tick);
    }

    function sendToGoogleForm(qrCodeData) {
        const amount = document.getElementById("amount").value;
        resultText.className = "loading";
        resultText.style.color = "#856404";
        resultText.innerText = "つうしん中... おかねをひいています...";

        // Googleフォームへのデータ送信URLを作成
        const submitUrl = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse?${ENTRY_BANGO}=${qrCodeData}&${ENTRY_KINGAKU}=${amount}&submit=Submit`;

        // フォーム送信を実行
        const beacon = new Image();
        beacon.src = submitUrl;

        // 送信完了の演出
        setTimeout(() => {
            playSuccessSound(); // 「ピロリーン！」
            resultText.className = "success";
            resultText.style.color = "#155724";
            resultText.innerHTML = `🟢 けっさいせいこう！<br>ばんごう: ${qrCodeData}<br>ひいたおかね: ${amount}えん`;
            document.getElementById("amount").value = "";
        }, 1200);
    }
</script>
</body>
</html>
